# Status Report Autopilot, single-deployment Docker Compose.
#
# Usage:
#   1. cp .env.example .env  (and set BETTER_AUTH_SECRET)
#   2. docker compose up --build
#
# The app container runs Drizzle migrations on every start (idempotent) and
# then serves Next.js on http://localhost:3000.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: status_report_autopilot
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d status_report_autopilot"]
      interval: 5s
      timeout: 3s
      retries: 12

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      # Inside the compose network the database is at host `db`.
      DATABASE_URL: postgres://postgres:postgres@db:5432/status_report_autopilot
      # Required, generate with: openssl rand -hex 32
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      APP_URL: ${APP_URL:-http://localhost:3000}
      # Optional integrations, leave blank to disable each feature.
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      EMAIL_FROM: ${EMAIL_FROM:-}
      CRON_SECRET: ${CRON_SECRET:-}

volumes:
  postgres-data:
